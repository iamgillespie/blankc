{% extends "invlayout.html" %}
{% block title %}

{% endblock %}
{% block main %}

<script>
    function eventCheckBox() {
  let checkboxs = document.getElementsByTagName("input");
  for(let i = 0; i < checkboxs.length ; i++) { //zero-based array
    checkboxs[i].checked = !checkboxs[i].checked;
  }
}
</script>

<div class="">
    <form class="form-control border-0 bg-dark" id="del" action="/inv" method="POST" enctype="multipart/form-data">
    <table class="table table-dark table-borderless table-responsive table-sm">
    <tr> 
        <th>
            <a href="#" id="selectall" name="selectall" autocomplete="off" checked onclick="eventCheckBox()">
                <i class="bi bi-check2-all"></i>
            </a>
          </th>       
      <th>
          name
      </th>
      <th>
          serial
      </th>
      <th>
          about
      </th>
      <th>
          price
      </th>
      <th>

      </th>
    </tr>
    {% for i in rows %}
    <tr>
        <td class="d-flex">
            <input class="form-check-input" type="checkbox" id="checkboxNoLabel" name="{{ i['serial'] }}" value="{{ i['serial'] }}" aria-label="...">
        </td>
        <td>
            {{ i['name'] }}
        </td>
        <td>
            {{ i['serial'] }}
        </td>
        <td>
            {{ i['summary'] }}
        </td>
        <td>
            ${{ i['price'] }}
        </td>
        <td><form>
            <button class="btn btn-outline-light" type="button" name="edit" value="{{ i['serial'] }}" name="edit"><i class="bi bi-pencil"></i></button>
            </form>
        </td>

    </tr>
    {% endfor %}
    </table>

    <div class="mx-auto w-auto float-start row text-light">
        <div class="col">
            <button id="submitButton" type="submit" class="btn btn-xs"><i class="bi bi-trash text-danger fs-2"></i></button>
        </div>
        <div class="col">
            <a class="btn btn-xs w-100 px-4" href="/add"><i class="bi bi-plus-square text-success fs-2"></i></a>
        </div>
    </div>

    </form>
  </div>

{% endblock %}
